# /srv/nginx-proxy/conf.d/serverstate.conf
# Cloudflare(HTTPS, Proxied) → 공유기 → nginx_proxy(80/443) → serverstate_grafana_prod:3000
# Cloudflare가 origin에 HTTPS로 연결하므로 443도 같이 listen해야 default_server로 빨려들어가지 않음.
# 인증서는 다른 서비스(heyvoca/openday/orderandgo)들과 동일한 Cloudflare Origin Cert 사용.

server {
    listen 80;
    listen 443 ssl;
    server_name serverstate.ghmate.com;
    ssl_certificate /etc/nginx/certs/cloudflare_chain.crt;
    ssl_certificate_key /etc/nginx/certs/cloudflare.key;

    location / {
        proxy_pass http://serverstate_grafana_prod:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
