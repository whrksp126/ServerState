# /srv/nginx-proxy/conf.d/serverstate.conf
# 글로벌 nginx_proxy가 80포트에서 받는 요청을 Grafana 컨테이너로 라우팅.
# Cloudflare(HTTPS) → 공유기(80) → nginx_proxy → serverstate_grafana_prod:3000

server {
    listen 80;
    server_name serverstate.ghmate.com;

    location / {
        proxy_pass http://serverstate_grafana_prod:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
