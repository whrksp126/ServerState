global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: serverstate

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # node-exporter는 host network 모드로 9100에서 동작
  # macOS: host.docker.internal 로 호스트 접근
  # Linux: extra_hosts의 host-gateway가 자동 매핑
  - job_name: node
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          host: home

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
